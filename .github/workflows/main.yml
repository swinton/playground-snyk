name: Main

on:
  workflow_dispatch:
    inputs: 
      runs-on:
        description: The type of machine to run the job on
        required: true
        type: string
        default: ubuntu-latest
      version:
        description: The version of snyk/actions/setup to use 
        required: true
        type: string
        default: d8f656ed88025ca3bacdfb5d2d1363dd8943832f

jobs:
  main:
    name: Main
    runs-on: ${{ inputs.runs-on }}
    steps:
    - name: Context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: |
        echo "$GITHUB_CONTEXT"
    - name: Setup Snyk
      uses: snyk/actions/setup@${{ inputs.version }}
    - run: |
        which snyk
        snyk --help
