name: Main

on:
  workflow_dispatch

jobs:
  main:
    name: Main
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Setup Snyk
      uses: snyk/actions/setup@d8f656ed88025ca3bacdfb5d2d1363dd8943832f
    - run: |
        which snyk
        snyk --help
  
